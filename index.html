<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الحجاز لمعدات السباكة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #060b18, #0d1528, #060b18);
      color: #f0f5ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(40,196,255,0.06) 0%, transparent 60%),
                  radial-gradient(circle at 70% 50%, rgba(167,139,250,0.04) 0%, transparent 50%);
      animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(-2%, -2%) rotate(3deg); }
    }
    .card {
      position: relative;
      z-index: 1;
      max-width: 620px;
      width: 100%;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 32px;
      padding: 48px 40px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.4), 0 0 60px rgba(40,196,255,0.05);
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #28c4ff, #63e2ff);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2rem;
      color: #060b18;
      box-shadow: 0 0 40px rgba(40,196,255,0.25);
    }
    h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
    .sub { color: #b8ccf0; margin-bottom: 36px; font-size: 1rem; }
    .links { display: grid; gap: 16px; }
    .links a {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-radius: 18px; text-decoration: none;
      font-weight: 700; font-size: 1rem;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative; overflow: hidden;
    }
    .links a span { display: flex; align-items: center; gap: 12px; position: relative; z-index: 1; }
    .links a i { position: relative; z-index: 1; }
    .link-client {
      background: linear-gradient(135deg, rgba(40,196,255,0.15), rgba(40,196,255,0.05));
      border: 1px solid rgba(40,196,255,0.2); color: #63e2ff;
    }
    .link-client:hover {
      background: linear-gradient(135deg, rgba(40,196,255,0.25), rgba(40,196,255,0.1));
      border-color: rgba(40,196,255,0.4); transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(40,196,255,0.15);
    }
    .link-admin {
      background: linear-gradient(135deg, rgba(255,210,92,0.15), rgba(255,210,92,0.05));
      border: 1px solid rgba(255,210,92,0.2); color: #ffd25c;
    }
    .link-admin:hover {
      background: linear-gradient(135deg, rgba(255,210,92,0.25), rgba(255,210,92,0.1));
      border-color: rgba(255,210,92,0.4); transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(255,210,92,0.15);
    }
    .badge { font-size: 0.7rem; padding: 4px 12px; border-radius: 60px; font-weight: 600; }
    .badge-client { background: rgba(40,196,255,0.2); color: #63e2ff; }
    .badge-admin { background: rgba(255,210,92,0.2); color: #ffd25c; }
    .footer-note {
      margin-top: 32px; color: #6a7a99; font-size: 0.8rem;
      border-top: 1px solid rgba(255,255,255,0.06); padding-top: 24px;
    }
    @media (max-width: 500px) {
      .card { padding: 32px 24px; }
      h1 { font-size: 1.4rem; }
      .links a { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><i class="fas fa-wrench"></i></div>
    <h1>الحجاز لمعدات السباكة</h1>
    <p class="sub">اختر النسخة التي تريد تشغيلها</p>
    <div class="links">
      <a href="zx/index.html" class="link-client">
        <span><i class="fas fa-store"></i> نسخة العميل — المعرض الإلكتروني</span>
        <span class="badge badge-client">3D فاخر</span>
        <i class="fas fa-arrow-left"></i>
      </a>
      <a href="zy/index.html" class="link-admin">
        <span><i class="fas fa-cog"></i> نسخة الإدارة — لوحة التحكم</span>
        <span class="badge badge-admin">محمية</span>
        <i class="fas fa-arrow-left"></i>
      </a>
    </div>
    <p class="footer-note">جميع الحقوق محفوظة &copy; 2026 الحجاز لمعدات السباكة<br>موقع احترافي بتقنيات 3D ورسومات عالية الدقة</p>
  </div>
</body>
</html>
