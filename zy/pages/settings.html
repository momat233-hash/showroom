<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الإعدادات | لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-wrench"></i>
        <span>لوحة التحكم</span>
      </div>
      <nav class="sidebar-nav">
        <ul>
          <li><a href="../index.html"><i class="fas fa-chart-pie"></i> <span>الإحصائيات</span></a></li>
          <li><a href="products.html"><i class="fas fa-box"></i> <span>المنتجات</span></a></li>
          <li><a href="orders.html"><i class="fas fa-shopping-cart"></i> <span>الطلبيات</span></a></li>
          <li><a href="settings.html" class="active"><i class="fas fa-cog"></i> <span>الإعدادات</span></a></li>
        </ul>
      </nav>
      <div class="sidebar-footer">
        <a href="../../zx/index.html" class="back-to-site"><i class="fas fa-external-link-alt"></i> العودة للموقع</a>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar glass">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
        <div class="topbar-left"></div>
        <div class="topbar-right">
          <div class="admin-user">
            <div class="user-avatar"><i class="fas fa-user-shield"></i></div>
            <div class="user-info">
              <span class="user-name">الإدارة</span>
              <span class="user-role">مدير النظام</span>
            </div>
          </div>
        </div>
      </header>

      <div class="admin-content">
        <div class="page-header">
          <h1>الإعدادات</h1>
          <p>إعدادات المتجر والموقع</p>
        </div>

        <div class="form-card glass settings-section">
          <h3><i class="fas fa-store"></i> معلومات المتجر</h3>
          <div class="form-group">
            <label>اسم المتجر</label>
            <input type="text" value="الحجاز لمعدات السباكة">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>البريد الإلكتروني</label>
              <input type="email" value="info@hijaz-plumbing.com">
            </div>
            <div class="form-group">
              <label>رقم الهاتف</label>
              <input type="tel" value="+966 55 123 4567">
            </div>
          </div>
          <div class="form-group">
            <label>العنوان</label>
            <input type="text" value="جدة، المملكة العربية السعودية">
          </div>
        </div>

        <div class="form-card glass settings-section">
          <h3><i class="fas fa-palette"></i> مظهر الموقع</h3>
          <div class="form-row">
            <div class="form-group">
              <label>اللون الرئيسي</label>
              <input type="color" value="#28c4ff" style="height:48px;cursor:pointer;">
            </div>
            <div class="form-group">
              <label>لون الخلفية</label>
              <input type="color" value="#060b18" style="height:48px;cursor:pointer;">
            </div>
          </div>
        </div>

        <div class="form-card glass settings-section">
          <h3><i class="fas fa-shield-alt"></i> الأمان</h3>
          <div class="form-row">
            <div class="form-group">
              <label>كلمة المرور الحالية</label>
              <input type="password" placeholder="********">
            </div>
            <div class="form-group">
              <label>كلمة المرور الجديدة</label>
              <input type="password" placeholder="كلمة مرور جديدة">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="showAdminToast('تم حفظ الإعدادات بنجاح')"><i class="fas fa-save"></i> حفظ التغييرات</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/app.js"></script>
</body>
</html>
